spring.application.name=smart-bazar

sever.port=8080

# 1. The exact driver class name you just fixed
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Database URL (Points to localhost, standard MySQL port 3306, and your database name)
spring.datasource.url=jdbc:mysql://localhost:3306/smart_bazar

# 3. Your MySQL server username (usually root)
spring.datasource.username=root

# 4. Your MySQL server password (replace 'your_password' with your actual MySQL password)
spring.datasource.password=root

# 5. Hibernate properties to automatically update tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

api.prefix=/api/v1

auth.token.expirationInMillis=3600000
auth.token.jwtSecret=3d9f6c2b7a8e1f4d5c9b0a2e7f8d6c1a4b5e9f0d3c7a8b1e6f2d4c9a7b5e1f3
